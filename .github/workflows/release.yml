name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  dry-run:
    name: Build release artifact manifest
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI gate
        run: bun run ci

      - name: Prepare release dry-run
        run: bun run release:dry-run

      - name: Upload release dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comiccanvas-release-dry-run-${{ github.ref_name }}
          path: |
            dist/release-manifest.json
            dist/shared/**
