<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComicCanvas — 节点设计预览</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1b1e;
    font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e9ecef;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    gap: 48px;
  }

  h1 { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: #495057; font-weight: 500; }

  .section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 720px;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #495057;
    align-self: flex-start;
  }
  .row {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .col-label {
    font-size: 11px;
    color: #495057;
    letter-spacing: .06em;
  }

  /* ── Node base ── */
  .node {
    position: relative;
    width: 200px;
    background: #25262b;
    border: 1px solid #373a40;
    border-radius: 8px;
    transition: border-color .15s, box-shadow .15s, width .2s ease;
    cursor: pointer;
    user-select: none;
  }
  .node:hover { border-color: #4a4e57; }
  .node.selected { border-color: #4dabf7; box-shadow: 0 0 0 2px rgba(77,171,247,.18); }
  .node.expanded { width: 280px; }

  /* header */
  .node-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    height: 44px;
  }
  .node-icon {
    width: 20px; height: 20px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .icon-text  { background: rgba(77,171,247,.18); color: #4dabf7; }
  .icon-image { background: rgba(81,207,102,.18); color: #51cf66; }
  .icon-video { background: rgba(255,212,59,.18);  color: #fcc419; }

  .node-label {
    font-size: 12px;
    font-weight: 500;
    color: #dee2e6;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .node-status {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-idle      { background: #495057; }
  .status-running   { background: #fcc419; box-shadow: 0 0 0 3px rgba(252,196,25,.2); animation: pulse 1.2s infinite; }
  .status-done      { background: #51cf66; }
  .status-error     { background: #ff6b6b; }

  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }

  /* expanded body */
  .node-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height .2s ease;
  }
  .node.expanded .node-body { max-height: 600px; }

  .node-divider { height: 1px; background: #2f3136; margin: 0 12px; }

  .node-section {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* form elements */
  label.field-label {
    font-size: 10px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #6c757d;
    display: block;
    margin-bottom: 2px;
  }
  textarea, input[type=text], select {
    width: 100%;
    background: #1e1f22;
    border: 1px solid #373a40;
    border-radius: 4px;
    color: #dee2e6;
    font: inherit;
    font-size: 12px;
    padding: 6px 8px;
    resize: none;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus, input:focus, select:focus { border-color: #4dabf7; }
  textarea { min-height: 60px; line-height: 1.5; }
  select { cursor: pointer; }
  select option { background: #25262b; }

  .param-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  /* image preview */
  .img-preview {
    width: 100%;
    aspect-ratio: 16/9;
    background: #1e1f22;
    border: 1px dashed #373a40;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .img-preview.portrait { aspect-ratio: 9/16; }
  .img-preview.square   { aspect-ratio: 1/1; }
  .img-preview span { font-size: 11px; color: #495057; }
  .img-preview img { width: 100%; height: 100%; object-fit: contain; display: block; }

  /* skeleton shimmer */
  .skeleton {
    background: linear-gradient(90deg, #2c2e33 25%, #35383f 50%, #2c2e33 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 3px;
    height: 10px;
  }
  .skeleton.full { width: 100%; }
  .skeleton.half { width: 55%; }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  /* buttons */
  .btn-row { display: flex; gap: 6px; }
  .btn {
    flex: 1;
    padding: 6px 0;
    border-radius: 4px;
    border: none;
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s, background .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #4dabf7; color: #0d1117; }
  .btn-ghost   { background: #2f3136; color: #868e96; border: 1px solid #373a40; }

  /* handle (connection point) */
  .handle {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #373a40;
    border: 2px solid #25262b;
    transition: background .15s, border-color .15s;
  }
  .handle:hover { background: #4dabf7; border-color: #4dabf7; }
  .handle-left  { left: -5px; top: 50%; transform: translateY(-50%); }
  .handle-right { right: -5px; top: 50%; transform: translateY(-50%); }
  .node.expanded .handle-left,
  .node.expanded .handle-right { top: 22px; transform: none; }

  /* running overlay */
  .running-bar {
    height: 2px;
    background: linear-gradient(90deg, transparent, #4dabf7, transparent);
    background-size: 200% 100%;
    animation: scan 1.4s linear infinite;
    border-radius: 0 0 8px 8px;
  }
  @keyframes scan { 0%{background-position:200%} 100%{background-position:-200%} }
</style>
</head>
<body>

<h1>ComicCanvas Studio — 节点设计</h1>

<!-- TEXT NODE -->
<div class="section">
  <div class="section-label">Text Node</div>
  <div class="row">
    <div class="col">
      <div class="col-label">折叠态</div>
      <div class="node" id="text-collapsed">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-text">T</div>
          <span class="node-label">场景描述</span>
          <div class="node-status status-idle"></div>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="col-label">展开态（点击后）</div>
      <div class="node expanded selected" id="text-expanded">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-text">T</div>
          <span class="node-label">场景描述</span>
          <div class="node-status status-idle"></div>
        </div>
        <div class="node-body" style="max-height:600px">
          <div class="node-divider"></div>
          <div class="node-section">
            <label class="field-label">文本内容</label>
            <textarea placeholder="输入提示词…">一座古老的石桥横跨溪流，两侧垂柳依依，晨雾弥漫。</textarea>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- IMAGE NODE -->
<div class="section">
  <div class="section-label">Image Node</div>
  <div class="row">
    <div class="col">
      <div class="col-label">折叠态</div>
      <div class="node">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-image">⬡</div>
          <span class="node-label">角色图</span>
          <div class="node-status status-done"></div>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="col-label">展开 — 空白待生成</div>
      <div class="node expanded selected">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-image">⬡</div>
          <span class="node-label">角色图</span>
          <div class="node-status status-idle"></div>
        </div>
        <div class="node-body" style="max-height:600px">
          <div class="node-divider"></div>
          <div class="node-section">
            <div class="img-preview portrait">
              <span>暂无图片</span>
            </div>
          </div>
          <div class="node-section">
            <label class="field-label">正向提示词</label>
            <textarea placeholder="（来自上游连接节点，或手动输入）" rows="2"></textarea>
            <div class="param-row" style="margin-top:4px">
              <div>
                <label class="field-label">模型</label>
                <select><option>flux-dev</option><option>flux-schnell</option><option>SDXL</option></select>
              </div>
              <div>
                <label class="field-label">画幅</label>
                <select><option>竖屏 9:16</option><option>横屏 16:9</option><option>方形 1:1</option></select>
              </div>
            </div>
          </div>
          <div class="node-section">
            <div class="btn-row">
              <button class="btn btn-primary">生成</button>
              <button class="btn btn-ghost">重置</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="col-label">展开 — 生成中</div>
      <div class="node expanded">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-image">⬡</div>
          <span class="node-label">角色图</span>
          <div class="node-status status-running"></div>
        </div>
        <div class="node-body" style="max-height:600px">
          <div class="node-divider"></div>
          <div class="node-section">
            <div class="img-preview portrait">
              <div style="width:100%;padding:12px;display:flex;flex-direction:column;gap:6px">
                <div class="skeleton full"></div>
                <div class="skeleton half"></div>
                <div class="skeleton full" style="height:40px;margin-top:4px"></div>
                <div class="skeleton half"></div>
              </div>
            </div>
          </div>
          <div class="node-section">
            <div class="btn-row">
              <button class="btn btn-ghost" style="flex:1">取消</button>
            </div>
          </div>
        </div>
        <div class="running-bar"></div>
      </div>
    </div>
    <div class="col">
      <div class="col-label">展开 — 已生成</div>
      <div class="node expanded">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-image">⬡</div>
          <span class="node-label">角色图</span>
          <div class="node-status status-done"></div>
        </div>
        <div class="node-body" style="max-height:600px">
          <div class="node-divider"></div>
          <div class="node-section">
            <div class="img-preview portrait" style="background:#141516;border-style:solid;border-color:#2f3136">
              <!-- Placeholder for generated image -->
              <div style="width:100%;height:100%;background:linear-gradient(160deg,#1c2333 0%,#2d1b33 100%);display:flex;align-items:center;justify-content:center;color:#6c757d;font-size:11px">生成结果</div>
            </div>
          </div>
          <div class="node-section">
            <div class="btn-row">
              <button class="btn btn-primary">重新生成</button>
              <button class="btn btn-ghost">编辑</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- VIDEO NODE -->
<div class="section">
  <div class="section-label">Video Node</div>
  <div class="row">
    <div class="col">
      <div class="col-label">折叠态</div>
      <div class="node">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-video">▶</div>
          <span class="node-label">场景视频</span>
          <div class="node-status status-idle"></div>
        </div>
      </div>
    </div>
    <div class="col">
      <div class="col-label">展开 — 配置态</div>
      <div class="node expanded selected">
        <div class="handle handle-left"></div>
        <div class="handle handle-right"></div>
        <div class="node-header">
          <div class="node-icon icon-video">▶</div>
          <span class="node-label">场景视频</span>
          <div class="node-status status-idle"></div>
        </div>
        <div class="node-body" style="max-height:600px">
          <div class="node-divider"></div>
          <div class="node-section">
            <div class="img-preview" style="position:relative">
              <span>暂无视频</span>
            </div>
          </div>
          <div class="node-section">
            <label class="field-label">提示词</label>
            <textarea placeholder="（来自上游或手动输入）" rows="2"></textarea>
            <div class="param-row" style="margin-top:4px">
              <div>
                <label class="field-label">模型</label>
                <select><option>Wan2.1</option><option>CogVideo</option><option>Kling</option></select>
              </div>
              <div>
                <label class="field-label">时长</label>
                <select><option>3s</option><option>5s</option><option>10s</option></select>
              </div>
            </div>
          </div>
          <div class="node-section">
            <div class="btn-row">
              <button class="btn btn-primary">生成</button>
              <button class="btn btn-ghost">重置</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- interaction script -->
<script>
  document.querySelectorAll('.node').forEach(node => {
    node.addEventListener('click', e => {
      // don't toggle when clicking form elements
      if (['TEXTAREA','INPUT','SELECT','BUTTON'].includes(e.target.tagName)) return;
      node.classList.toggle('expanded');
      node.classList.toggle('selected', node.classList.contains('expanded'));
    });
  });
</script>
</body>
</html>
