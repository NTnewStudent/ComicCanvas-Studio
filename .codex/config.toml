# Codex project configuration for ComicCanvas Studio.
# Codex loads this project-scoped layer only after the project is trusted.

project_doc_max_bytes = 65536
project_doc_fallback_filenames = []
project_root_markers = [".git", "AGENTS.md", "package.json"]

[features]
multi_agent = true
hooks = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "python ltm/bin/ltm.py capture-turn"
command_windows = "python ltm/bin/ltm.py capture-turn"
timeout = 30
statusMessage = "Capturing LTM turn"
